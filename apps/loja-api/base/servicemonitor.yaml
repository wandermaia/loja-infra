# apps/loja-api/base/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: loja-api
spec:
  selector:
    matchLabels:
      app: loja-api
  # namespaceSelector:
  #   matchNames:
  #     - loja-api-staging
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s